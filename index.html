<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AniVault - Anime Episodes</title>
  <style>
    :root {
      --bg: #0c0d10;
      --surface: #17191f;
      --surface-2: #222630;
      --text: #f7f3ea;
      --muted: #b7becb;
      --line: rgba(255, 255, 255, 0.12);
      --accent: #f6b14b;
      --accent-2: #51c6d8;
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img,
    video {
      display: block;
      max-width: 100%;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 18px clamp(18px, 4vw, 56px);
      border-bottom: 1px solid var(--line);
      background: rgba(12, 13, 16, 0.88);
      backdrop-filter: blur(18px);
    }

    .brand {
      font-size: 1.25rem;
      font-weight: 900;
      letter-spacing: 0;
    }

    .nav-links {
      display: flex;
      gap: 18px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .nav-links a:hover,
    .text-link:hover {
      color: var(--accent);
    }

    .hero {
      min-height: 76vh;
      display: flex;
      align-items: center;
      padding: 80px clamp(18px, 5vw, 72px);
      background:
        linear-gradient(90deg, rgba(12, 13, 16, 0.95) 0%, rgba(12, 13, 16, 0.72) 46%, rgba(12, 13, 16, 0.3) 100%),
        url("https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=1800&q=80") center/cover;
    }

    .hero-copy {
      width: min(680px, 100%);
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent-2);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      max-width: 900px;
      margin-bottom: 18px;
      font-size: clamp(2.55rem, 7vw, 5.6rem);
      line-height: 0.98;
      letter-spacing: 0;
    }

    h2 {
      margin-bottom: 0;
      font-size: clamp(1.6rem, 4vw, 2.6rem);
    }

    h3 {
      margin-bottom: 10px;
      font-size: 1.28rem;
    }

    p {
      color: var(--muted);
      line-height: 1.65;
    }

    .primary-action,
    .text-link {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      font-weight: 800;
    }

    .primary-action {
      margin-top: 12px;
      padding: 0 18px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: var(--accent);
      color: #15100a;
    }

    .section,
    .watch-section {
      padding: 64px clamp(18px, 5vw, 72px);
    }

    .section-heading {
      margin-bottom: 24px;
    }

    .anime-grid,
    .featured-grid,
    .episode-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .anime-card,
    .featured-card,
    .player-panel,
    .episode-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .anime-card {
      overflow: hidden;
    }

    .poster-link img {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
    }

    .card-body {
      padding: 18px;
    }

    .meta {
      margin-bottom: 8px;
      color: var(--accent);
      font-size: 0.86rem;
      font-weight: 800;
    }

    .featured-card {
      min-height: 132px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 18px;
    }

    .featured-card span,
    .featured-card small {
      color: var(--muted);
    }

    .featured-card strong {
      font-size: 1.12rem;
    }

    .anime-hero {
      padding: 64px clamp(18px, 5vw, 72px);
      background:
        linear-gradient(90deg, rgba(12, 13, 16, 0.96), rgba(12, 13, 16, 0.62)),
        var(--banner-image) center/cover;
    }

    .anime-hero-content {
      display: grid;
      grid-template-columns: 220px minmax(0, 740px);
      align-items: center;
      gap: 28px;
    }

    .detail-poster {
      width: 220px;
      aspect-ratio: 4 / 5;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      object-fit: cover;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tag-row span {
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .watch-section {
      background: #111319;
    }

    .player-panel {
      display: grid;
      grid-template-columns: minmax(0, 1.7fr) minmax(280px, 0.8fr);
      overflow: hidden;
    }

    video,
    iframe {
      width: 100%;
      height: 100%;
      min-height: 360px;
      background: #050506;
    }

    video {
      object-fit: contain;
    }

    iframe {
      border: 0;
    }

    .is-hidden {
      display: none;
    }

    .now-playing {
      padding: 24px;
      border-left: 1px solid var(--line);
    }

    .episode-card {
      min-height: 190px;
      padding: 18px;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .episode-card:hover,
    .episode-card.is-active {
      transform: translateY(-2px);
      border-color: rgba(246, 177, 75, 0.75);
      background: var(--surface-2);
    }

    .episode-card span,
    .episode-card small {
      display: block;
      color: var(--muted);
      line-height: 1.5;
    }

    .episode-card strong {
      display: block;
      margin: 10px 0;
      font-size: 1.08rem;
    }

    .episode-number {
      color: var(--accent) !important;
      font-size: 0.82rem;
      font-weight: 900;
    }

    .site-footer {
      padding: 24px clamp(18px, 5vw, 72px);
      border-top: 1px solid var(--line);
    }

    .site-footer p {
      margin: 0;
      font-size: 0.92rem;
    }

    @media (max-width: 900px) {
      .anime-grid,
      .featured-grid,
      .episode-list,
      .player-panel,
      .anime-hero-content {
        grid-template-columns: 1fr;
      }

      .detail-poster {
        width: min(240px, 100%);
      }

      .now-playing {
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }

    @media (max-width: 560px) {
      .site-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .hero {
        min-height: 72vh;
        padding-top: 56px;
      }

      .section,
      .watch-section,
      .anime-hero {
        padding-top: 44px;
        padding-bottom: 44px;
      }

      video {
        min-height: 220px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#home">AniVault</a>
    <nav class="nav-links" aria-label="Main navigation">
      <a href="#home">Home</a>
      <a href="#anime-list">Anime</a>
    </nav>
  </header>

  <main id="app"></main>

  <footer class="site-footer">
    <p>AniVault template. Replace sample titles, posters, and video links with your own anime content before publishing.</p>
  </footer>

  <script>
    const ANIME_LIBRARY = [
      {
        id: "sky-blade",
        title: "Sky Blade Academy",
        year: "2026",
        rating: "TV-14",
        genre: "Action Fantasy",
        status: "Season 1",
        poster: "https://www.crunchyroll.com/series/GT00371630/daemons-of-the-shadow-realm?srsltid=AfmBOopveLEbl537s970_Xfs-S15aWrJvBIAbPpTfi1ZOBxwEY7EivbO",
        banner: "https://www.crunchyroll.com/series/GT00371630/daemons-of-the-shadow-realm?srsltid=AfmBOopveLEbl537s970_Xfs-S15aWrJvBIAbPpTfi1ZOBxwEY7EivbO",
        description: "A rookie swordswoman enters a floating academy where rival houses duel above the clouds for the right to guard the sky realm.",
        episodes: [
          {
            number: 1,
            title: "The First Flight",
            duration: "24m",
            synopsis: "Mira reaches the academy and discovers that her entrance exam is already in progress.",
            video: "https://streamtape.com/e/08kzDpQJArubbPK"
          },
          {
            number: 2,
            title: "House of Silver Wings",
            duration: "23m",
            synopsis: "A proud captain challenges Mira after her hidden blade technique catches the council's attention.",
            video: "https://media.w3.org/2010/05/sintel/trailer.mp4"
          },
          {
            number: 3,
            title: "Storm Gate Trial",
            duration: "25m",
            synopsis: "The first team mission sends the class toward a gate that only opens during lightning storms.",
            video: "https://media.w3.org/2010/05/bunny/trailer.mp4"
          }
        ]
      },
      {
        id: "moonlit-guild",
        title: "Moonlit Guild",
        year: "2026",
        rating: "PG-13",
        genre: "Adventure Mystery",
        status: "Season 1",
        poster: "https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=900&q=80",
        banner: "https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=1800&q=80",
        description: "A quiet mapmaker joins a guild that hunts forgotten magic under moonlit ruins and sealed cities.",
        episodes: [
          {
            number: 1,
            title: "Map of the Sleeping City",
            duration: "22m",
            synopsis: "Noa receives an impossible map that redraws itself whenever the moon rises.",
            video: "https://media.w3.org/2010/05/sintel/trailer.mp4"
          },
          {
            number: 2,
            title: "Lanterns Below",
            duration: "24m",
            synopsis: "The guild follows blue lanterns into a market hidden beneath the old capital.",
            video: "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"
          },
          {
            number: 3,
            title: "The Bell Without Sound",
            duration: "24m",
            synopsis: "A silent bell reveals the next ruin, but only to the member with the strongest regret.",
            video: "https://media.w3.org/2010/05/bunny/trailer.mp4"
          }
        ]
      },
      {
        id: "neon-drifters",
        title: "Neon Drifters",
        year: "2026",
        rating: "TV-14",
        genre: "Sci-Fi Racing",
        status: "Season 1",
        poster: "https://images.unsplash.com/photo-1519608487953-e999c86e7455?auto=format&fit=crop&w=900&q=80",
        banner: "https://images.unsplash.com/photo-1519608487953-e999c86e7455?auto=format&fit=crop&w=1800&q=80",
        description: "Street pilots race anti-gravity bikes through a megacity where every victory unlocks another piece of a vanished AI.",
        episodes: [
          {
            number: 1,
            title: "Start Line Zero",
            duration: "23m",
            synopsis: "Kai steals into a midnight qualifier and wins a bike that should not exist.",
            video: "https://media.w3.org/2010/05/bunny/trailer.mp4"
          },
          {
            number: 2,
            title: "Red Signal Run",
            duration: "24m",
            synopsis: "The crew enters a tunnel race controlled by a traffic system with a dangerous secret.",
            video: "https://media.w3.org/2010/05/sintel/trailer.mp4"
          },
          {
            number: 3,
            title: "Ghost in the Grid",
            duration: "25m",
            synopsis: "A phantom racer appears in every district at once, forcing Kai to trust the AI fragment.",
            video: "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"
          }
           {
            number: 3,
            title: "Ghost in the Grid",
            duration: "25m",
            synopsis: "A phantom racer appears in every district at once, forcing Kai to trust the AI fragment.",
            video: "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"
          }
        ]
      }
    ];

    const app = document.getElementById("app");

    function episodeLabel(episode) {
      return `Episode ${episode.number}: ${episode.title}`;
    }

    function animeUrl(animeId, episodeNumber = "") {
      return episodeNumber ? `#anime/${animeId}/episode/${episodeNumber}` : `#anime/${animeId}`;
    }

    function getRoute() {
      const hash = window.location.hash.replace(/^#/, "");
      const parts = hash.split("/").filter(Boolean);
      if (parts[0] === "anime") {
        return {
          page: "anime",
          animeId: parts[1],
          episodeNumber: parts[3] ? Number(parts[3]) : null
        };
      }
      return { page: "home" };
    }

    function renderHome() {
      app.innerHTML = `
        <section class="hero">
          <div class="hero-copy">
            <p class="eyebrow">Stream library template</p>
            <h1>A clean anime website with separate anime pages and playable episodes.</h1>
            <p>Browse anime, open a dedicated show page, choose an episode, and watch it in the built-in player.</p>
            <a class="primary-action" href="#anime-list">Explore anime</a>
          </div>
        </section>

        <section class="section" id="latest">
          <div class="section-heading">
            <p class="eyebrow">Recently added</p>
            <h2>Featured episodes</h2>
          </div>
          <div class="featured-grid">
            ${ANIME_LIBRARY.map((anime) => {
              const episode = anime.episodes[0];
              return `
                <a class="featured-card" href="${animeUrl(anime.id, episode.number)}">
                  <span>${anime.title}</span>
                  <strong>${episodeLabel(episode)}</strong>
                  <small>${episode.duration}</small>
                </a>
              `;
            }).join("")}
          </div>
        </section>

        <section class="section" id="anime-list">
          <div class="section-heading">
            <p class="eyebrow">Series</p>
            <h2>Anime collection</h2>
          </div>
          <div class="anime-grid">
            ${ANIME_LIBRARY.map((anime) => `
              <article class="anime-card">
                <a class="poster-link" href="${animeUrl(anime.id)}" aria-label="Open ${anime.title}">
                  <img src="${anime.poster}" alt="${anime.title} poster">
                </a>
                <div class="card-body">
                  <p class="meta">${anime.genre} · ${anime.status}</p>
                  <h3>${anime.title}</h3>
                  <p>${anime.description}</p>
                  <a class="text-link" href="${animeUrl(anime.id)}">View episodes</a>
                </div>
              </article>
            `).join("")}
          </div>
        </section>
      `;
    }

    function renderAnimePage(animeId, episodeNumber) {
      const anime = ANIME_LIBRARY.find((item) => item.id === animeId);
      if (!anime) {
        app.innerHTML = `<section class="section"><h1>Anime not found</h1><a class="text-link" href="#home">Back home</a></section>`;
        return;
      }

      app.innerHTML = `
        <section class="anime-hero" style="--banner-image: url('${anime.banner}')">
          <div class="anime-hero-content">
            <img class="detail-poster" src="${anime.poster}" alt="${anime.title} poster">
            <div>
              <p class="eyebrow">${anime.genre}</p>
              <h1>${anime.title}</h1>
              <p>${anime.description}</p>
              <div class="tag-row">
                <span>${anime.year}</span>
                <span>${anime.rating}</span>
                <span>${anime.status}</span>
              </div>
            </div>
          </div>
        </section>

        <section class="watch-section" id="watch">
          <div class="player-panel">
            <video id="episodePlayer" controls poster="${anime.banner}">
              <source src="" type="video/mp4">
              Your browser does not support the video tag.
            </video>
            <iframe
              class="is-hidden"
              id="embedPlayer"
              title="Episode embed player"
              allow="fullscreen; autoplay; encrypted-media; picture-in-picture"
              allowfullscreen>
            </iframe>
            <div class="now-playing">
              <p class="eyebrow">Now playing</p>
              <h2 id="nowTitle">Select an episode</h2>
              <p id="nowSynopsis">Choose an episode below and the video will load here.</p>
            </div>
          </div>
        </section>

        <section class="section episode-section" id="episodes">
          <div class="section-heading">
            <p class="eyebrow">Episodes</p>
            <h2>${anime.title}</h2>
          </div>
          <div class="episode-list">
            ${anime.episodes.map((episode) => `
              <button class="episode-card" type="button" data-episode="${episode.number}">
                <span class="episode-number">EP ${String(episode.number).padStart(2, "0")}</span>
                <strong>${episode.title}</strong>
                <span>${episode.synopsis}</span>
                <small>${episode.duration}</small>
              </button>
            `).join("")}
          </div>
        </section>
      `;

      const buttons = [...document.querySelectorAll(".episode-card")];
      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          const episode = anime.episodes.find((item) => item.number === Number(button.dataset.episode));
          window.location.hash = animeUrl(anime.id, episode.number);
          loadEpisode(episode, buttons, true);
        });
      });

      const selected = anime.episodes.find((item) => item.number === episodeNumber) || anime.episodes[0];
      loadEpisode(selected, buttons, false);
    }

    function loadEpisode(episode, buttons, shouldScroll) {
      const player = document.getElementById("episodePlayer");
      const embedPlayer = document.getElementById("embedPlayer");
      const source = player.querySelector("source");
      const isDirectVideo = episode.video.toLowerCase().includes(".mp4");

      if (isDirectVideo) {
        embedPlayer.src = "";
        embedPlayer.classList.add("is-hidden");
        player.classList.remove("is-hidden");
        source.src = episode.video;
        player.load();
      } else {
        source.src = "";
        player.pause();
        player.load();
        player.classList.add("is-hidden");
        embedPlayer.classList.remove("is-hidden");
        embedPlayer.src = episode.video;
      }

      document.getElementById("nowTitle").textContent = episodeLabel(episode);
      document.getElementById("nowSynopsis").textContent = episode.synopsis;

      buttons.forEach((button) => {
        button.classList.toggle("is-active", Number(button.dataset.episode) === episode.number);
      });

      if (shouldScroll) {
        document.getElementById("watch").scrollIntoView({ behavior: "smooth", block: "start" });
        if (isDirectVideo) {
          player.play().catch(() => {});
        }
      }
    }

    function renderRoute() {
      const route = getRoute();
      if (route.page === "anime") {
        renderAnimePage(route.animeId, route.episodeNumber);
      } else {
        renderHome();
      }
    }

    window.addEventListener("hashchange", renderRoute);
    renderRoute();
  </script>
</body>
</html>
